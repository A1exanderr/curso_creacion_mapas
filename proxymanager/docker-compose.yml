networks:
  app_network_produccion:
    external: true
services:
  nginx_proxy_manager_v2:
    image: jc21/nginx-proxy-manager:latest
    container_name: nginx_proxy_v2
    restart: unless-stopped
    ports:
      - '80:80'   # HTTP público
      - '443:443' # HTTPS público
      - '2030:81'   # Panel de administración
    volumes:
      - ./data:/data
      - ./letsencrypt:/etc/letsencrypt
    networks:
      - app_network_produccion
